<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f5f3ef" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)">
<title>SyncBeast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<!--
  ============================================================
  ADDING A NEW APP
  ============================================================
  1. Drop the new HTML file into /apps/  (e.g. /apps/newbaby.html)
  2. Add one entry to the APPS array below.
  3. Done. No build step, no dependencies.

  Each entry takes:
    id   : URL-safe slug used in the hash route (#/id)
    name : Display label shown in the switcher
    file : Path to the standalone HTML file
  ============================================================
-->

<style>
  :root {
    color-scheme: light;
    --bg: #f5f3ef;
    --panel: #ebe8e2;
    --panel-2: #e0ddd6;
    --ink: #222;
    --dim: #777;
    --dimmer: #aaa;
    --line: #d4d1c9;
    --accent: #2a6f4a;
  }
  html[data-theme="dark"] {
    color-scheme: dark;
    --bg: #121212;
    --panel: #1c1c1c;
    --panel-2: #242424;
    --ink: #e8e8e8;
    --dim: #888;
    --dimmer: #555;
    --line: #2e2e2e;
    --accent: #8ace00;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace;
    font-size: 13px;
    line-height: 1.5;
    overflow: hidden;
  }
  html { transition: background 0.2s; }

  .app-shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
  }

  /* ---------- Switcher bar ---------- */
  .switcher {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.6rem 1.25rem;
    border-bottom: 1px solid var(--line);
    background: var(--bg);
  }

  .switcher-apps {
    display: flex;
    align-items: center;
    gap: 0;
    flex: 1 1 auto;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;
    -ms-overflow-style: none;
    /* allow last button breathing room */
    padding-right: 0.25rem;
  }
  .switcher-apps::-webkit-scrollbar { display: none; }

  .app-btn {
    background: var(--panel);
    border: 1px solid var(--line);
    border-right: none;
    padding: 0.35rem 0.7rem;
    font-family: inherit;
    font-size: 0.72rem;
    line-height: 1;
    cursor: pointer;
    color: var(--dim);
    white-space: nowrap;
    transition: color 0.15s, background 0.15s, border-color 0.15s;
    letter-spacing: 0.01em;
  }
  .app-btn:first-child { border-radius: 0; }
  .app-btn:last-child { border-right: 1px solid var(--line); }
  .app-btn:hover {
    color: var(--ink);
    border-color: var(--ink);
    /* sibling border interactions */
    z-index: 1;
    position: relative;
  }
  .app-btn[aria-current="page"] {
    color: var(--ink);
    background: var(--panel-2);
    font-weight: 700;
    z-index: 1;
    position: relative;
  }

  .theme-toggle {
    flex: 0 0 auto;
    background: var(--panel);
    border: 1px solid var(--line);
    padding: 0.35rem 0.55rem;
    font-family: inherit;
    font-size: 0.7rem;
    cursor: pointer;
    line-height: 1;
    transition: border-color 0.15s;
    display: inline-flex;
    gap: 0.3rem;
    align-items: center;
    color: var(--ink);
  }
  .theme-toggle:hover { border-color: var(--ink); }
  .theme-toggle .tm-arrow { color: var(--dim); }
  html:not([data-theme="dark"]) .theme-toggle .tm-light { color: var(--ink); }
  html:not([data-theme="dark"]) .theme-toggle .tm-dark  { color: var(--dimmer); }
  html[data-theme="dark"]       .theme-toggle .tm-light { color: var(--dimmer); }
  html[data-theme="dark"]       .theme-toggle .tm-dark  { color: var(--ink); }
  html:not([data-theme="dark"]) .theme-toggle .tm-arrow::before { content: "→"; }
  html[data-theme="dark"]       .theme-toggle .tm-arrow::before { content: "←"; }

  /* ---------- Frame area ---------- */
  .frame-wrap {
    flex: 1 1 auto;
    position: relative;
    overflow: hidden;
    background: var(--bg);
  }
  iframe.app-frame {
    width: 100%;
    height: 100%;
    border: 0;
    background: var(--bg);
    display: block;
  }
  iframe.app-frame.is-loading { opacity: 0; }
  iframe.app-frame { transition: opacity 0.12s ease; }

  /* Subtle loading hint */
  .loading-hint {
    position: absolute;
    top: 0.75rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.7rem;
    color: var(--dim);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    letter-spacing: 0.05em;
  }
  .loading-hint.visible { opacity: 1; }

  /* ---------- Tighter on small screens ---------- */
  @media (max-width: 640px) {
    .switcher { padding: 0.5rem 0.6rem; gap: 0.5rem; }
    .app-btn { padding: 0.3rem 0.55rem; font-size: 0.68rem; }
    .theme-toggle { padding: 0.3rem 0.45rem; font-size: 0.66rem; }
  }
</style>
</head>
<body>
<div class="app-shell">
  <nav class="switcher" aria-label="App switcher">
    <div class="switcher-apps" id="switcherApps" role="tablist"></div>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
      <span class="tm-light">light</span><span class="tm-arrow"></span><span class="tm-dark">dark</span>
    </button>
  </nav>

  <div class="frame-wrap">
    <div class="loading-hint" id="loadingHint">loading</div>
    <iframe id="appFrame" class="app-frame" title="app" referrerpolicy="no-referrer"></iframe>
  </div>
</div>

<script>
(function () {
  // ============================================================
  // APP MANIFEST — add new apps here. Order = order shown in bar.
  // ============================================================
  const APPS = [
    { id: 'aifbaby',    name: 'AIFbaby',    file: 'apps/aifbaby.html'    },
    { id: 'wavbaby',    name: 'WAVbaby',    file: 'apps/wavbaby.html'    },
    { id: 'mp3baby',    name: 'MP3baby',    file: 'apps/mp3baby.html'    },
    { id: 'trimbaby',   name: 'TRIMbaby',   file: 'apps/trimbaby.html'   },
    { id: 'lufsbaby',   name: 'LUFSbaby',   file: 'apps/lufsbaby.html'   },
    { id: 'tapbaby',    name: 'TAPbaby',    file: 'apps/tapbaby.html'    },
    { id: 'keybaby',    name: 'KEYbaby',    file: 'apps/keybaby.html'    },
    { id: 'solbaby',    name: 'SOLbaby',    file: 'apps/solbaby.html'    },
    { id: 'savethatad', name: 'SaveThatAd', file: 'apps/savethatad.html' },
    // Example placeholder for the 10th app — uncomment when ready:
    // { id: 'newbaby', name: 'NEWbaby', file: 'apps/newbaby.html' },
  ];

  const DEFAULT_APP_ID = APPS[0].id;
  const THEME_KEY = 'syncbeast-theme';

  // Per-app theme keys used by the individual tools.
  // We mirror the shell's theme into each of these so a freshly-loaded
  // iframe picks up the right theme on startup with no flicker.
  const PER_APP_THEME_KEYS = [
    'aifbaby-theme',
    'wavbaby-theme',
    'mp3baby-theme',
    'trimbaby-theme',
    'lufs-theme',
    'tap-theme',
    'keybaby-theme',
    'solbaby-theme',
    'sta-theme',
  ];

  // ---------- Theme ----------
  function readInitialTheme() {
    try {
      const stored = localStorage.getItem(THEME_KEY);
      if (stored === 'dark' || stored === 'light') return stored;
      // Fall back to any app-specific key that already exists
      for (const k of PER_APP_THEME_KEYS) {
        const v = localStorage.getItem(k);
        if (v === 'dark' || v === 'light') return v;
      }
    } catch (e) {}
    // Fall back to system preference
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      return 'dark';
    }
    return 'light';
  }

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    try {
      localStorage.setItem(THEME_KEY, theme);
      // Sync into every per-app key so the next iframe load is correct
      for (const k of PER_APP_THEME_KEYS) localStorage.setItem(k, theme);
    } catch (e) {}
    // Push theme into the currently loaded iframe live (no reload)
    syncThemeIntoFrame(theme);
  }

  function syncThemeIntoFrame(theme) {
    const iframe = document.getElementById('appFrame');
    try {
      const doc = iframe.contentDocument;
      if (doc && doc.documentElement) {
        doc.documentElement.setAttribute('data-theme', theme);
      }
    } catch (e) {
      // Cross-origin or not loaded yet — silent fail is fine.
    }
  }

  // Set theme as early as possible to avoid flash
  applyTheme(readInitialTheme());

  document.getElementById('themeToggle').addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme') || 'light';
    applyTheme(cur === 'dark' ? 'light' : 'dark');
  });

  // ---------- Switcher render ----------
  const switcherEl = document.getElementById('switcherApps');
  const iframe = document.getElementById('appFrame');
  const loadingHint = document.getElementById('loadingHint');

  APPS.forEach((app, i) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'app-btn';
    btn.textContent = app.name;
    btn.setAttribute('data-app', app.id);
    btn.setAttribute('role', 'tab');
    btn.setAttribute('aria-label', app.name);
    btn.addEventListener('click', () => navigateTo(app.id));
    switcherEl.appendChild(btn);
  });

  // ---------- Routing ----------
  function getAppIdFromHash() {
    // Accept both "#/aifbaby" and "#aifbaby" for friendliness
    const raw = (window.location.hash || '').replace(/^#\/?/, '').trim().toLowerCase();
    if (!raw) return null;
    return APPS.some(a => a.id === raw) ? raw : null;
  }

  let currentAppId = null;
  let loadingTimer = null;

  function navigateTo(appId, opts = {}) {
    const app = APPS.find(a => a.id === appId);
    if (!app) return;
    if (appId === currentAppId && !opts.force) return;

    currentAppId = appId;

    // Update hash without triggering hashchange loop
    const desiredHash = '#/' + appId;
    if (window.location.hash !== desiredHash) {
      // Use replaceState on first load, pushState on user nav, so back/forward works.
      if (opts.initial) {
        history.replaceState(null, '', desiredHash);
      } else {
        history.pushState(null, '', desiredHash);
      }
    }

    // Update active state on buttons
    [...switcherEl.children].forEach(btn => {
      const isActive = btn.dataset.app === appId;
      if (isActive) btn.setAttribute('aria-current', 'page');
      else btn.removeAttribute('aria-current');
      btn.setAttribute('aria-selected', isActive ? 'true' : 'false');
    });

    // Show loading hint after a brief delay (avoid flicker for fast loads)
    iframe.classList.add('is-loading');
    clearTimeout(loadingTimer);
    loadingTimer = setTimeout(() => loadingHint.classList.add('visible'), 250);

    // Update document title to reflect current app
    document.title = app.name + ' · SyncBeast';

    // Load the app
    iframe.src = app.file;
  }

  // ---------- Iframe load handling ----------
  iframe.addEventListener('load', () => {
    iframe.classList.remove('is-loading');
    loadingHint.classList.remove('visible');
    clearTimeout(loadingTimer);

    try {
      const doc = iframe.contentDocument;
      if (!doc || !doc.documentElement) return;

      // 1) Ensure theme matches shell (defense in depth; per-app keys already set above)
      const theme = document.documentElement.getAttribute('data-theme') || 'light';
      doc.documentElement.setAttribute('data-theme', theme);

      // 2) Hide the in-app theme toggle so we don't have two of them.
      //    The app's own toggle still works if visited standalone at /apps/xxx.html.
      if (!doc.getElementById('__sb_hide_in_app_toggle')) {
        const style = doc.createElement('style');
        style.id = '__sb_hide_in_app_toggle';
        style.textContent = '#themeToggle{display:none !important;}';
        doc.head.appendChild(style);
      }

      // 3) When the in-app code writes a new theme value (it still might, since
      //    the toggle DOM exists but is hidden), watch the attribute and mirror it
      //    back up to the shell. This keeps things in sync even if some other
      //    in-app code path changes the theme.
      if (!doc.documentElement.__sbThemeObserver) {
        const obs = new MutationObserver(() => {
          const t = doc.documentElement.getAttribute('data-theme') || 'light';
          if (t !== document.documentElement.getAttribute('data-theme')) {
            applyTheme(t);
          }
        });
        obs.observe(doc.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
        doc.documentElement.__sbThemeObserver = obs;
      }
    } catch (e) {
      // Same-origin should always work on GH Pages; this catch is for local file:// preview etc.
    }
  });

  // ---------- Browser back/forward ----------
  window.addEventListener('hashchange', () => {
    const id = getAppIdFromHash() || DEFAULT_APP_ID;
    if (id !== currentAppId) navigateTo(id, { fromHash: true });
  });

  // ---------- Initial load ----------
  const startId = getAppIdFromHash() || DEFAULT_APP_ID;
  navigateTo(startId, { initial: true });
})();
</script>
</body>
</html>
