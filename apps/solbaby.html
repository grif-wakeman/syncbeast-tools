<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f5f3ef" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)">
  <title>SOLbaby</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f3ef;
      --panel: #ebe8e2;
      --panel-2: #e0ddd6;
      --ink: #222;
      --dim: #777;
      --dimmer: #aaa;
      --line: #d4d1c9;
      --warn: #9a3520;
      --ok: #2a6f4a;
      --accent: #2a6f4a;
      /* Note colors. Pastel rainbow. */
      --note-do: #c97a7a;
      --note-re: #c9967a;
      --note-mi: #c9b97a;
      --note-fa: #7aaa7a;
      --note-sol: #7a9ec9;
      --note-la: #9a7ac9;
      --note-si: #c97aa6;
    }

    html[data-theme="dark"] {
      color-scheme: dark;
      --bg: #121212;
      --panel: #1c1c1c;
      --panel-2: #242424;
      --ink: #e8e8e8;
      --dim: #888;
      --dimmer: #555;
      --line: #2e2e2e;
      --warn: #e5634a;
      --ok: #8ace00;
      --accent: #8ace00;
      --note-do: #d49090;
      --note-re: #d4a890;
      --note-mi: #d4c790;
      --note-fa: #90c090;
      --note-sol: #90b0d4;
      --note-la: #b090d4;
      --note-si: #d490b8;
    }

    html {
      background: var(--bg);
      min-height: 100%;
      transition: background 0.12s;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace;
      font-size: 13px;
      line-height: 1.5;
    }

    body {
      padding: 1.5rem 1.25rem 3rem;
      transition: background 0.12s;
    }

    .wrap {
      max-width: 780px;
      margin: 0 auto;
    }

    /* Header. Matches LUFSbaby exactly. */
    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding-bottom: 0.75rem;
      margin-bottom: 1.25rem;
      border-bottom: 1px solid var(--line);
      gap: 1rem;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    h1 {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .tag {
      font-size: 0.7rem;
      color: var(--dim);
    }

    .theme-toggle {
      background: var(--panel);
      border: 1px solid var(--line);
      padding: 0.25rem 0.5rem;
      font-family: inherit;
      font-size: 0.7rem;
      cursor: pointer;
      line-height: 1;
      transition: border-color 0.12s;
      display: inline-flex;
      gap: 0.3rem;
      align-items: center;
      color: var(--ink);
    }

    .theme-toggle:hover {
      border-color: var(--ink);
    }

    .theme-toggle .tm-arrow {
      color: var(--dim);
    }

    html:not([data-theme="dark"]) .theme-toggle .tm-light {
      color: var(--ink);
    }

    html:not([data-theme="dark"]) .theme-toggle .tm-dark {
      color: var(--dimmer);
    }

    html[data-theme="dark"] .theme-toggle .tm-light {
      color: var(--dimmer);
    }

    html[data-theme="dark"] .theme-toggle .tm-dark {
      color: var(--ink);
    }

    html:not([data-theme="dark"]) .theme-toggle .tm-arrow::before {
      content: "→";
    }

    html[data-theme="dark"] .theme-toggle .tm-arrow::before {
      content: "←";
    }

    /* Input zone. Inherits drop-zone aesthetic. */
    .input-zone {
      border: 1px dashed var(--dimmer);
      background: var(--panel);
      padding: 0;
      transition: background 0.12s, border-color 0.12s;
      display: block;
    }

    .input-zone:focus-within {
      background: var(--panel-2);
      border-color: var(--ink);
    }

    textarea {
      width: 100%;
      min-height: 4rem;
      padding: 0.75rem 1rem;
      background: transparent;
      color: var(--ink);
      border: none;
      border-radius: 0;
      font-family: inherit;
      font-size: 0.85rem;
      line-height: 1.6;
      resize: vertical;
      outline: none;
    }

    textarea::placeholder {
      color: var(--dim);
    }

    /* Staff + octave panel layout */
    .staff-row {
      margin-top: 0.75rem;
      display: grid;
      grid-template-columns: 1fr 96px;
      gap: 0.75rem;
      align-items: stretch;

    }

    .staff-panel {
      position: relative;
      background: var(--panel);
      border: 1px solid var(--line);
      overflow: hidden;
      cursor: grab;
      touch-action: pan-y;
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.12s;

    }

    .staff-panel.scrubbing {
      cursor: grabbing;
    }

    .staff-panel.no-content {
      cursor: default;
    }

    .staff-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
    }

    .playhead {
      position: absolute;
      top: 8px;
      bottom: 8px;
      left: 50%;
      width: 1px;
      background: var(--dim);
      opacity: 0.35;
      transform: translateX(-0.5px);
      pointer-events: none;
    }

    .playhead::before,
    .playhead::after {
      content: '';
      position: absolute;
      left: 50%;
      width: 5px;
      height: 5px;
      background: var(--dim);
      transform: translateX(-50%) rotate(45deg);
      opacity: 0.5;
    }

    .playhead::before {
      top: -3px;
    }

    .playhead::after {
      bottom: -3px;
    }

    .notes-track {
      position: absolute;
      top: 0;
      left: 50%;
      height: 100%;
      will-change: transform;
      transition: transform 220ms cubic-bezier(0.2, 0.7, 0.2, 1);
    }

    .notes-track.scrubbing {
      transition: none;
    }

    /* Octave circle panel */
    .octave-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0.5rem;
      transition: background 0.12s;

    }

    .octave-svg {
      width: 100%;
      max-width: 80px;
      height: auto;
      display: block;
      transition: background 0.12s;

    }

    .octave-label {
      margin-top: 0.4rem;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--dim);
      min-height: 0.85em;
    }

    /* Info row below staff */
    .info-row {
      display: flex;
      justify-content: space-between;
      margin-top: 0.4rem;
      font-size: 0.65rem;
      color: var(--dim);
      letter-spacing: 0.05em;
      min-height: 0.85em;
    }

    .info-row .word {
      color: var(--ink);
    }

    .info-row .word.rest {
      color: var(--dim);
      font-style: italic;
    }

    /* Transport controls */
    .transport {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 0.5rem;
      padding: 0.4rem 0.5rem;
      border: 1px solid var(--line);
      background: var(--panel);
      transition: background 0.12s;

    }

    .transport-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--panel-2);
      border: 1px solid var(--line);
      color: var(--ink);
      font-family: inherit;
      font-size: 0.7rem;
      padding: 0.25rem 0.6rem;
      cursor: pointer;
      line-height: 1;
      transition: border-color 0.12s, background 0.12s, color 0.12s;
    }

    .transport-btn:hover:not(:disabled) {
      border-color: var(--ink);
    }

    .transport-btn:disabled {
      color: var(--dimmer);
      cursor: not-allowed;
      background: var(--panel);
    }

    .transport-btn.playing {
      border-color: var(--ink);
    }

    .transport-btn svg {
      display: block;
    }

    .transport-btn-label {
      text-transform: lowercase;
      letter-spacing: 0.05em;
    }

    .bpm-control {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: background 0.12s;

    }

    .bpm-label {
      font-size: 0.65rem;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    #bpmInput {
      width: 3.6rem;
      background: var(--panel-2);
      color: var(--ink);
      border: 1px solid var(--line);
      font-family: inherit;
      font-size: 0.7rem;
      padding: 0.2rem 0.4rem;
      outline: none;
      transition: border-color 0.12s;
      text-align: center;
      appearance: textfield;
      -moz-appearance: textfield;
      transition: background 0.12s;

    }

    #bpmInput::-webkit-outer-spin-button,
    #bpmInput::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    #bpmInput:focus {
      border-color: var(--ink);
    }

    .transport-status {
      flex: 1;
      font-size: 0.65rem;
      color: var(--dim);
      text-align: right;
      letter-spacing: 0.05em;
      min-height: 0.85em;
    }

    /* Footer. Matches LUFSbaby. */
    footer {
      margin-top: 1.5rem;
      font-size: 0.65rem;
      color: var(--dim);
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    @media (max-width: 520px) {
      .staff-row {
        grid-template-columns: 1fr 80px;
      }
    }
  </style>
  <script>
    (function initTheme() {
      const saved = (() => {
        try { return localStorage.getItem('solbaby-theme'); } catch (e) { return null; }
      })();
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>

<body>
  <div class="wrap">
    <header>
      <h1>SOLbaby</h1>
      <div class="header-right">
        <div class="tag">solresol notation</div>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode"><span
            class="tm-light">light</span><span class="tm-arrow"></span><span class="tm-dark">dark</span></button>
      </div>
    </header>

    <label class="input-zone">
      <textarea id="input" placeholder="Type to see your words on the staff..." rows="3"></textarea>
    </label>

    <div class="staff-row">
      <div class="staff-panel" id="staffContainer">
        <svg class="staff-svg" id="staffLines" preserveAspectRatio="none"></svg>
        <div class="notes-track" id="notesTrack"></div>
        <div class="playhead"></div>
      </div>
      <div class="octave-panel">
        <svg class="octave-svg" id="octaveSvg" viewBox="0 0 100 100"></svg>
        <div class="octave-label" id="octaveLabel">&nbsp;</div>
      </div>
    </div>

    <div class="transport">
      <button class="transport-btn" id="playBtn" disabled aria-label="Play">
        <svg viewBox="0 0 16 16" width="10" height="10" aria-hidden="true">
          <polygon points="3,2 13,8 3,14" fill="currentColor" />
        </svg>
        <span class="transport-btn-label">play</span>
      </button>
      <div class="bpm-control">
        <label for="bpmInput" class="bpm-label">bpm</label>
        <input type="number" id="bpmInput" min="40" max="480" value="100" step="1">
      </div>
      <div class="transport-status" id="transportStatus">&nbsp;</div>
    </div>

    <div class="info-row">
      <span id="currentWord">&nbsp;</span>
      <span id="coverage">&nbsp;</span>
    </div>

    <footer>
      <span>© Sync Beast LLC</span>
    </footer>
  </div>

        w.replace(/s$/, ''),
        w.replace(/ed$/, ''),
        w.replace(/ed$/, 'e'),
        w.replace(/ing$/, ''),
        w.replace(/ing$/, 'e'),
        w.replace(/ly$/, ''),
        w.replace(/er$/, ''),
        w.replace(/er$/, 'e'),
        w.replace(/est$/, ''),
        w.replace(/est$/, 'e')
      ];
      for (const s of stems) {
        if (s && s !== w && s.length >= 3 && DICT[s]) return DICT[s];
      }
      return null;
    }

    function splitSolresol(solresolWord) {
      const out = [];
      let i = 0;
      while (i < solresolWord.length) {
        const three = solresolWord.substr(i, 3);
        const two = solresolWord.substr(i, 2);
        if (three === 'sol') { out.push('sol'); i += 3; }
        else if (['do', 're', 'mi', 'fa', 'la', 'si'].includes(two)) { out.push(two); i += 2; }
        else { i++; }
      }
      return out;
    }

    function tokenize(text) {
      return text.match(/[a-zA-Z']+/g) || [];
    }

    function buildNotes(text) {
      const tokens = tokenize(text);
      const notes = [];
      let translated = 0;
      tokens.forEach(tok => {
        const sol = lookupWord(tok);
        if (sol) {
          const syllables = splitSolresol(sol);
          syllables.forEach((syl, i) => {
            notes.push({
              syllable: syl,
              word: tok,
              isRest: false,
              isFirstSyllable: i === 0
            });
          });
          if (syllables.length > 0) translated++;
        } else {
          notes.push({
            syllable: null,
            word: tok,
            isRest: true,
            isFirstSyllable: true
          });
        }
      });
      return { notes, translated, total: tokens.length };
    }

    /* --- Staff rendering --- */
    function renderStaffLines() {
      const svg = document.getElementById('staffLines');
      const container = document.getElementById('staffContainer');
      container.style.height = STAFF_HEIGHT + 'px';
      const w = container.clientWidth || 600;
      svg.setAttribute('viewBox', `0 0 ${w} ${STAFF_HEIGHT}`);
      let lines = '';
      for (let i = 0; i < STAFF_LINES; i++) {
        const y = STAFF_TOP + i * LINE_GAP;
        lines += `<line x1="0" y1="${y}" x2="${w}" y2="${y}" stroke="var(--line)" stroke-width="1"/>`;
      }
      svg.innerHTML = lines;
    }

    function renderNotes() {
      const track = document.getElementById('notesTrack');
      const container = document.getElementById('staffContainer');
      const containerWidth = container.clientWidth || 600;

      const totalWidth = Math.max(state.notes.length * NOTE_SPACING + 100, containerWidth);

      let svg = `<svg width="${totalWidth}" height="${STAFF_HEIGHT}" viewBox="0 0 ${totalWidth} ${STAFF_HEIGHT}" style="display:block;">`;

      state.notes.forEach((note, i) => {
        const x = i * NOTE_SPACING + NOTE_SPACING / 2;
        if (note.isRest) {
          // Simple quarter-rest abstraction: two small stacked blocks centered on staff
          const cy = STAFF_TOP + LINE_GAP * 2;
          svg += `<g opacity="0.55">`;
          svg += `<rect x="${x - 3}" y="${cy - 6}" width="6" height="3.5" fill="var(--dim)"/>`;
          svg += `<rect x="${x - 3}" y="${cy + 2.5}" width="6" height="3.5" fill="var(--dim)"/>`;
          svg += `</g>`;
        } else {
          const y = NOTE_POSITIONS[note.syllable];
          const color = `var(${NOTE_COLOR_VAR[note.syllable]})`;
          svg += `<g>`;
          // Notehead (slight ellipse for sheet music feel)
          svg += `<ellipse cx="${x}" cy="${y}" rx="${NOTE_RADIUS + 0.8}" ry="${NOTE_RADIUS}" fill="${color}"/>`;
          // Stem
          const stemUp = y > STAFF_TOP + LINE_GAP * 2;
          const stemX = stemUp ? x + NOTE_RADIUS + 0.3 : x - NOTE_RADIUS - 0.3;
          const stemY2 = stemUp ? y - STEM_LENGTH : y + STEM_LENGTH;
          svg += `<line x1="${stemX}" y1="${y}" x2="${stemX}" y2="${stemY2}" stroke="${color}" stroke-width="1.2"/>`;
          // Ledger line if note is above/below staff
          if (y < STAFF_TOP - 1 || y > STAFF_BOTTOM + 1) {
            svg += `<line x1="${x - 8}" y1="${y}" x2="${x + 8}" y2="${y}" stroke="var(--line)" stroke-width="1"/>`;
          }
          svg += `</g>`;
        }
      });

      svg += '</svg>';
      track.innerHTML = svg;
      track.style.width = totalWidth + 'px';

      positionPlayhead();
    }

    function positionPlayhead() {
      const track = document.getElementById('notesTrack');
      if (state.notes.length === 0) {
        track.style.transform = 'translateX(0px)';
        state.currentIdx = -1;
        updateOctave();
        return;
      }
      const idx = state.notes.length - 1;
      state.currentIdx = idx;
      const noteX = idx * NOTE_SPACING + NOTE_SPACING / 2;
      const offset = -noteX;
      track.style.transform = `translateX(${offset}px)`;
      updateOctave();
    }

    /* --- Octave circle rendering --- */
    // Build the 7-dot circle. Dots placed clockwise starting from the top.
    // do = top (12 o'clock), then re, mi, fa, sol, la, si clockwise.
    function buildOctaveSvg(activeSyllable, isRest) {
      const cx = 50, cy = 50;
      const radius = 32;
      const dotRadius = 5;
      let svg = '';
      // Outer ring (subtle)
      svg += `<circle cx="${cx}" cy="${cy}" r="${radius}" fill="none" stroke="var(--line)" stroke-width="1"/>`;
      SYLLABLES.forEach((syl, i) => {
        const angle = -Math.PI / 2 + (i * 2 * Math.PI) / SYLLABLES.length;
        const px = cx + radius * Math.cos(angle);
        const py = cy + radius * Math.sin(angle);
        const isActive = !isRest && syl === activeSyllable;
        if (isActive) {
          svg += `<circle cx="${px}" cy="${py}" r="${dotRadius + 1}" fill="var(${NOTE_COLOR_VAR[syl]})"/>`;
        } else {
          svg += `<circle cx="${px}" cy="${py}" r="${dotRadius}" fill="var(--panel)" stroke="var(--dimmer)" stroke-width="1"/>`;
        }
      });
      return svg;
    }

    function updateOctave() {
      const octaveSvg = document.getElementById('octaveSvg');
      const octaveLabel = document.getElementById('octaveLabel');
      const wordDisplay = document.getElementById('currentWord');

      if (state.currentIdx < 0 || state.notes.length === 0) {
        octaveSvg.innerHTML = buildOctaveSvg(null, true);
        octaveLabel.textContent = '';
        wordDisplay.textContent = '';
        return;
      }

      const note = state.notes[state.currentIdx];
      if (note.isRest) {
        octaveSvg.innerHTML = buildOctaveSvg(null, true);
        octaveLabel.textContent = 'rest';
        wordDisplay.innerHTML = `<span class="word rest">${note.word.toLowerCase()}</span>`;
      } else {
        octaveSvg.innerHTML = buildOctaveSvg(note.syllable, false);
        octaveLabel.textContent = note.syllable;
        wordDisplay.innerHTML = `<span class="word">${note.word.toLowerCase()}</span>`;
      }
    }

    function update() {
      const input = document.getElementById('input').value;
      if (input === state.lastText) return;
      state.lastText = input;
      // Typing interrupts playback
      if (state.isPlaying) stopPlayback();
      const { notes, translated, total } = buildNotes(input);
      state.notes = notes;
      renderNotes();
      const coverageEl = document.getElementById('coverage');
      if (total > 0) {
        coverageEl.textContent = `${translated}/${total}`;
      } else {
        coverageEl.textContent = '';
      }
      updatePlayButtonState();
    }

    /* --- Playback --- */
    function getAudioContext() {
      if (!state.audioCtx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        state.audioCtx = new AC();
      }
      return state.audioCtx;
    }

    function getBpm() {
      const raw = parseInt(document.getElementById('bpmInput').value, 10);
      if (isNaN(raw)) return 100;
      return Math.max(40, Math.min(480, raw));
    }

    function getNoteDuration() {
      // One beat per note (quarter note at the given tempo)
      return 60 / getBpm();
    }

    function scheduleNote(audioCtx, syllable, startTime, duration) {
      const freq = NOTE_FREQ[syllable];
      if (!freq) return null;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(freq, startTime);
      // Envelope: silent → peak (attack) → hold → silent (release)
      const hold = duration * NOTE_HOLD_RATIO;
      const peak = 0.18; // keep volume conservative
      gain.gain.setValueAtTime(0, startTime);
      gain.gain.linearRampToValueAtTime(peak, startTime + ATTACK);
      gain.gain.setValueAtTime(peak, startTime + hold - RELEASE);
      gain.gain.linearRampToValueAtTime(0, startTime + hold);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(startTime);
      osc.stop(startTime + hold + 0.02);
      return osc;
    }

    function startPlayback() {
      if (state.notes.length === 0) return;
      if (state.isPlaying) return;
      const audioCtx = getAudioContext();
      // Resume context if it was suspended (autoplay restrictions)
      if (audioCtx.state === 'suspended') audioCtx.resume();

      // Determine starting index: if we're at the end already, restart from 0
      let startIdx = state.currentIdx;
      if (startIdx < 0 || startIdx >= state.notes.length - 1) startIdx = 0;

      state.isPlaying = true;
      state.playStartNoteIdx = startIdx;
      state.playStartTime = audioCtx.currentTime + 0.05; // small lead-in to avoid edge clicks
      state.scheduledSources = [];

      const dur = getNoteDuration();
      // Schedule every note (including rests as silent gaps)
      for (let i = startIdx; i < state.notes.length; i++) {
        const noteStart = state.playStartTime + (i - startIdx) * dur;
        const note = state.notes[i];
        if (!note.isRest) {
          const src = scheduleNote(audioCtx, note.syllable, noteStart, dur);
          if (src) state.scheduledSources.push(src);
        }
      }

      // Disable transition during playback so RAF can drive smooth scroll
      document.getElementById('notesTrack').classList.add('scrubbing');

      // Update button
      const btn = document.getElementById('playBtn');
      btn.classList.add('playing');
      btn.querySelector('.transport-btn-label').textContent = 'pause';
      btn.querySelector('svg').innerHTML = '<rect x="3" y="3" width="3.5" height="10" fill="currentColor"/><rect x="9.5" y="3" width="3.5" height="10" fill="currentColor"/>';
      btn.setAttribute('aria-label', 'Pause');

      // Start RAF loop
      tickPlayback();
    }

    function tickPlayback() {
      if (!state.isPlaying) return;
      const audioCtx = state.audioCtx;
      const dur = getNoteDuration();
      const elapsed = audioCtx.currentTime - state.playStartTime;
      const localIdx = Math.floor(elapsed / dur);
      const totalIdx = state.playStartNoteIdx + localIdx;

      if (totalIdx >= state.notes.length) {
        // Playback finished
        stopPlayback({ snapToEnd: true });
        return;
      }

      if (totalIdx >= 0 && totalIdx !== state.currentIdx) {
        state.currentIdx = totalIdx;
        updateOctave();
      }

      // Smooth scroll: interpolate position within the current beat
      const fractional = (elapsed / dur) - localIdx;
      const noteIdxFloat = state.playStartNoteIdx + localIdx + fractional;
      const noteX = noteIdxFloat * NOTE_SPACING + NOTE_SPACING / 2;
      const track = document.getElementById('notesTrack');
      track.style.transform = `translateX(${-noteX}px)`;

      state.rafId = requestAnimationFrame(tickPlayback);
    }

    function stopPlayback(opts) {
      opts = opts || {};
      if (!state.isPlaying && state.scheduledSources.length === 0) return;
      state.isPlaying = false;

      // Cancel any future audio
      state.scheduledSources.forEach(src => {
        try { src.stop(0); } catch (e) { }
        try { src.disconnect(); } catch (e) { }
      });
      state.scheduledSources = [];

      if (state.rafId) {
        cancelAnimationFrame(state.rafId);
        state.rafId = 0;
      }

      // Restore CSS transition
      document.getElementById('notesTrack').classList.remove('scrubbing');

      // Update button
      const btn = document.getElementById('playBtn');
      btn.classList.remove('playing');
      btn.querySelector('.transport-btn-label').textContent = 'play';
      btn.querySelector('svg').innerHTML = '<polygon points="3,2 13,8 3,14" fill="currentColor"/>';
      btn.setAttribute('aria-label', 'Play');

      // Snap playhead. If we stopped at the end (or by user typing), snap to last note.
      if (opts.snapToEnd && state.notes.length > 0) {
        state.currentIdx = state.notes.length - 1;
      }
      // Re-apply positionPlayhead behavior (snap to currentIdx with transition)
      if (state.notes.length > 0) {
        const idx = state.currentIdx >= 0 ? state.currentIdx : state.notes.length - 1;
        const noteX = idx * NOTE_SPACING + NOTE_SPACING / 2;
        document.getElementById('notesTrack').style.transform = `translateX(${-noteX}px)`;
        state.currentIdx = idx;
        updateOctave();
      }
    }

    function updatePlayButtonState() {
      const btn = document.getElementById('playBtn');
      // Disabled if no notes, or no playable notes (all rests)
      const hasPlayable = state.notes.some(n => !n.isRest);
      btn.disabled = !hasPlayable;
    }

    /* --- Scrub --- */
    const SCRUB_THRESHOLD = 4; // pixels before scrub engages
    const SCRUB_TAP_MIN_INTERVAL = 60; // ms between scrub tones to prevent overlap
    const SCRUB_TAP_DURATION = 0.12; // seconds per scrub note

    function playScrubTone(syllable) {
      const freq = NOTE_FREQ[syllable];
      if (!freq) return;
      const audioCtx = getAudioContext();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(freq, now);
      const peak = 0.14;
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(peak, now + 0.005);
      gain.gain.linearRampToValueAtTime(0, now + SCRUB_TAP_DURATION);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + SCRUB_TAP_DURATION + 0.02);
    }

    function clientXFromEvent(e) {
      if (e.touches && e.touches.length > 0) return e.touches[0].clientX;
      if (e.changedTouches && e.changedTouches.length > 0) return e.changedTouches[0].clientX;
      return e.clientX;
    }

    function onScrubStart(e) {
      if (state.notes.length === 0) return;
      // Stop any in-flight playback so scrub takes over cleanly
      if (state.isPlaying) stopPlayback();

      state.scrubArmed = true;
      state.isScrubbing = false; // becomes true once movement threshold crossed
      state.scrubStartX = clientXFromEvent(e);
      state.scrubStartIdx = state.currentIdx >= 0 ? state.currentIdx : state.notes.length - 1;
      state.scrubLastTapIdx = state.scrubStartIdx;
      state.scrubLastTapTime = 0;
    }

    function onScrubMove(e) {
      if (!state.scrubArmed) return;
      const x = clientXFromEvent(e);
      const dx = x - state.scrubStartX;

      if (!state.isScrubbing) {
        if (Math.abs(dx) < SCRUB_THRESHOLD) return;
        state.isScrubbing = true;
        document.getElementById('staffContainer').classList.add('scrubbing');
        document.getElementById('notesTrack').classList.add('scrubbing');
      }

      // Prevent default to stop touch scrolling once we're really scrubbing
      if (e.cancelable) e.preventDefault();

      // Dragging right reveals earlier notes (track moves right, content scrolls back)
      // Dragging left advances forward. So: idx delta = -dx / NOTE_SPACING
      const idxDelta = -dx / NOTE_SPACING;
      let newIdxFloat = state.scrubStartIdx + idxDelta;

      // Clamp to bounds
      newIdxFloat = Math.max(0, Math.min(state.notes.length - 1, newIdxFloat));

      // Move the track
      const noteX = newIdxFloat * NOTE_SPACING + NOTE_SPACING / 2;
      document.getElementById('notesTrack').style.transform = `translateX(${-noteX}px)`;

      // Snap to nearest note for index tracking
      const newIdx = Math.round(newIdxFloat);
      if (newIdx !== state.currentIdx) {
        state.currentIdx = newIdx;
        updateOctave();
        // Fire scrub tone if we crossed into a new playable note and enough time has passed
        const note = state.notes[newIdx];
        const nowMs = performance.now();
        if (note && !note.isRest && newIdx !== state.scrubLastTapIdx &&
          nowMs - state.scrubLastTapTime >= SCRUB_TAP_MIN_INTERVAL) {
          playScrubTone(note.syllable);
          state.scrubLastTapIdx = newIdx;
          state.scrubLastTapTime = nowMs;
        }
      }
    }

    function onScrubEnd() {
      if (!state.scrubArmed) return;
      state.scrubArmed = false;
      const wasScrubbing = state.isScrubbing;
      state.isScrubbing = false;
      document.getElementById('staffContainer').classList.remove('scrubbing');

      if (wasScrubbing) {
        // Settle: re-enable transition and snap track to exact note position
        document.getElementById('notesTrack').classList.remove('scrubbing');
        const idx = state.currentIdx;
        const noteX = idx * NOTE_SPACING + NOTE_SPACING / 2;
        // Force reflow before applying transition-driven snap so it animates the settle
        requestAnimationFrame(() => {
          document.getElementById('notesTrack').style.transform = `translateX(${-noteX}px)`;
        });
      }
    }

    /* --- Theme handling (matches LUFSbaby pattern) --- */


    /* --- Init --- */
    function init() {
      const btn = document.getElementById('themeToggle');
      if (btn) {
        btn.addEventListener('click', () => {
          const cur = document.documentElement.getAttribute('data-theme') || 'light';
          const next = cur === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          try { localStorage.setItem('solbaby-theme', next); } catch (e) { }
          renderStaffLines();
          renderNotes();
          updateOctave();
        });
      }

      document.getElementById('input').addEventListener('input', update);

      // Play button
      const playBtn = document.getElementById('playBtn');
      playBtn.addEventListener('click', () => {
        if (state.isPlaying) {
          stopPlayback();
        } else {
          startPlayback();
        }
      });

      // BPM input: clamp on change, and if currently playing, restart at new tempo
      const bpmInput = document.getElementById('bpmInput');
      bpmInput.addEventListener('change', () => {
        let v = parseInt(bpmInput.value, 10);
        if (isNaN(v)) v = 100;
        v = Math.max(40, Math.min(480, v));
        bpmInput.value = v;
        if (state.isPlaying) {
          // Reschedule at new tempo from current position
          const wasIdx = state.currentIdx;
          stopPlayback();
          state.currentIdx = wasIdx;
          startPlayback();
        }
      });

      // Pause when tab hidden so audio doesn't keep playing in background
      document.addEventListener('visibilitychange', () => {
        if (document.hidden && state.isPlaying) stopPlayback();
      });

      // Scrub: mouse + touch on the staff panel
      const staffContainer = document.getElementById('staffContainer');
      staffContainer.addEventListener('mousedown', onScrubStart);
      window.addEventListener('mousemove', onScrubMove);
      window.addEventListener('mouseup', onScrubEnd);
      staffContainer.addEventListener('touchstart', onScrubStart, { passive: true });
      window.addEventListener('touchmove', onScrubMove, { passive: false });
      window.addEventListener('touchend', onScrubEnd);
      window.addEventListener('touchcancel', onScrubEnd);
      // Prevent native drag image on Firefox/Safari
      staffContainer.addEventListener('dragstart', (e) => e.preventDefault());

      let resizeTimer;
      window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
          renderStaffLines();
          renderNotes();
        }, 100);
      });

      renderStaffLines();
      renderNotes();
      updateOctave();
      updatePlayButtonState();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
