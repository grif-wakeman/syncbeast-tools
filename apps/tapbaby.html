<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f5f3ef" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)">
  <title>TAPbaby</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f3ef;
      --panel: #ebe8e2;
      --panel-2: #e0ddd6;
      --ink: #222;
      --dim: #777;
      --dimmer: #aaa;
      --line: #d4d1c9;
      --warn: #9a3520;
      --ok: #2a6f4a;
      --accent: #2a6f4a;
      --tooltip-bg: #222;
      --tooltip-ink: #f5f3ef;
    }

    html[data-theme="dark"] {
      color-scheme: dark;
      --bg: #121212;
      --panel: #1c1c1c;
      --panel-2: #242424;
      --ink: #e8e8e8;
      --dim: #888;
      --dimmer: #555;
      --line: #2e2e2e;
      --warn: #e5634a;
      --ok: #8ace00;
      --accent: #8ace00;
      --tooltip-bg: #e8e8e8;
      --tooltip-ink: #121212;
    }

    html {
      background: var(--bg);
      min-height: 100%;
      transition: background 0.12s;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace;
      font-size: 13px;
      line-height: 1.5;
    }

    body {
      padding: 1.5rem 1.25rem 3rem;
      transition: background 0.12s;
    }

    .wrap {
      max-width: 780px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding-bottom: 0.75rem;
      margin-bottom: 1.25rem;
      border-bottom: 1px solid var(--line);
      gap: 1rem;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    h1 {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .tag {
      font-size: 0.7rem;
      color: var(--dim);
    }

    .theme-toggle {
      background: var(--panel);
      border: 1px solid var(--line);
      padding: 0.25rem 0.5rem;
      font-family: inherit;
      font-size: 0.7rem;
      cursor: pointer;
      line-height: 1;
      transition: border-color 0.12s;
      display: inline-flex;
      gap: 0.3rem;
      align-items: center;
      color: var(--ink);
    }

    .theme-toggle:hover {
      border-color: var(--ink);
    }

    .theme-toggle .tm-arrow {
      color: var(--dim);
    }

    html:not([data-theme="dark"]) .theme-toggle .tm-light {
      color: var(--ink);
    }

    html:not([data-theme="dark"]) .theme-toggle .tm-dark {
      color: var(--dimmer);
    }

    html[data-theme="dark"] .theme-toggle .tm-light {
      color: var(--dimmer);
    }

    html[data-theme="dark"] .theme-toggle .tm-dark {
      color: var(--ink);
    }

    html:not([data-theme="dark"]) .theme-toggle .tm-arrow::before {
      content: "→";
    }

    html[data-theme="dark"] .theme-toggle .tm-arrow::before {
      content: "←";
    }

    .mult-toggle,
    .met-toggle {
      background: var(--panel);
      border: 1px solid var(--line);
      padding: 0.25rem 0.5rem;
      font-family: inherit;
      font-size: 0.7rem;
      font-weight: 700;
      line-height: 1;
      color: var(--ink);
      cursor: pointer;
      transition: border-color 0.12s, color 0.12s, background 0.12s;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .mult-toggle {
      /* Fixed width so cycling 1x / 2x / .5x doesn't shift the layout. */
      width: 2.5rem;
    }

    .met-toggle {
      /* Fixed width to match feel of mult button. */
      width: 2.5rem;
      text-transform: lowercase;
    }

    .mult-toggle:hover,
    .met-toggle:not(:disabled):hover {
      border-color: var(--ink);
    }

    .met-toggle:disabled {
      color: var(--dimmer);
      cursor: default;
      border-color: var(--line);
    }

    .met-toggle[aria-pressed="true"] {
      background: var(--panel-2);
      color: var(--ok);
      border-color: var(--ok);
    }

    /* Tap zone — same DNA as .drop, but it's the readout */
    .tap {
      border: 1px dashed var(--dimmer);
      background: var(--panel);
      padding: 2.5rem 1rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      display: block;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }

    .tap:hover {
      background: var(--panel-2);
      border-color: var(--ink);
    }

    .tap:focus-visible {
      border-color: var(--ink);
    }

    .tap.flash {
      background: var(--panel-2);
      border-color: var(--ink);
    }

    .bpm {
      font-size: 4.5rem;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
      /* Gray "listening" state: starts at full ink on each tap,
       fades down via the --fade custom property toward --dimmer.
       Lock state overrides with solid green. */
      color: var(--ink);
      opacity: var(--fade, 1);
      transition: opacity var(--fade-dur, 0.6s) ease-out, color 0.25s ease-out;
    }

    .bpm.idle {
      color: var(--dimmer);
      opacity: 1;
    }

    .bpm.locked {
      color: var(--ok);
      opacity: 1;
    }

    .bpm-unit {
      display: block;
      font-size: 0.65rem;
      font-weight: 400;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 0.75rem;
    }

    .tap-sub {
      font-size: 0.7rem;
      color: var(--dim);
      margin-top: 1rem;
    }

    /* Show keyboard hint on devices with a physical keyboard (hover = mouse/trackpad
     environments, which reliably indicate a keyboard is also present). On touch-only
     devices, show the simpler "Tap here" — the T key isn't reachable. */
    .tap-hint-key {
      display: none;
    }

    .tap-hint-touch {
      display: inline;
    }

    @media (hover: hover) and (pointer: fine) {
      .tap-hint-key {
        display: inline;
      }

      .tap-hint-touch {
        display: none;
      }
    }

    kbd {
      font-family: inherit;
      font-size: 0.65rem;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 2px;
      padding: 0 0.3rem;
      color: var(--ink);
    }

    .reset {
      margin-top: 1rem;
      background: var(--panel);
      border: 1px solid var(--line);
      color: var(--dim);
      padding: 0.4rem 0.75rem;
      font-family: inherit;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
    }

    .reset:hover {
      color: var(--ink);
      border-color: var(--ink);
    }

    .reset:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .reset:disabled:hover {
      color: var(--dim);
      border-color: var(--line);
    }

    footer {
      margin-top: 1.5rem;
      font-size: 0.65rem;
      color: var(--dim);
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .info {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--dim);
      cursor: help;
      position: relative;
      background: none;
      border: none;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .info.info-footer-word {
      width: auto;
      height: auto;
      border-radius: 0;
      font-family: inherit;
      font-style: normal;
      font-size: inherit;
      font-weight: 400;
      color: var(--dim);
      text-transform: inherit;
      letter-spacing: inherit;
      line-height: inherit;
      cursor: pointer;
      border-bottom: 1px dotted var(--dimmer);
    }

    .info.info-footer-word:hover,
    .info.info-footer-word.open {
      color: var(--ink);
      border-bottom-color: var(--ink);
    }

    .info-panel {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      max-width: calc(100vw - 2rem);
      background: var(--tooltip-bg);
      color: var(--tooltip-ink);
      border: 1px solid var(--tooltip-bg);
      padding: 0.6rem 0.75rem;
      font-size: 0.7rem;
      font-weight: 400;
      font-style: normal;
      text-transform: none;
      letter-spacing: 0;
      line-height: 1.5;
      z-index: 10;
      display: none;
      text-align: left;
      font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace;
    }

    @media (hover: hover) {
      .info:hover .info-panel {
        display: block;
      }
    }

    .info.open .info-panel {
      display: block;
    }

    .privacy-head {
      font-weight: 700;
      margin-bottom: 0.4rem;
      font-size: 0.75rem;
    }

    .info-panel p {
      font-size: 0.7rem;
      margin-bottom: 0.4rem;
      line-height: 1.5;
    }

    .info-panel p:last-child {
      margin-bottom: 0;
    }

    @media (max-width: 500px) {
      .info-panel {
        position: fixed;
        left: 1rem;
        right: 1rem;
        bottom: 1rem;
        top: auto;
        transform: none;
        width: auto;
        max-width: none;
      }

      .bpm {
        font-size: 3.5rem;
      }
    }
  </style>
  <script>
    (function initTheme() {
      const saved = (() => {
        try { return localStorage.getItem('tap-theme'); } catch (e) { return null; }
      })();
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>

<body>
  <div class="wrap">
    <header>
      <h1>TAPbaby</h1>
      <div class="header-right">
        <button type="button" class="met-toggle" id="metToggle" aria-label="Metronome" aria-pressed="false"
          disabled>met</button>
        <button type="button" class="mult-toggle" id="multToggle" aria-label="Cycle tempo multiplier">1x</button>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode"><span
            class="tm-light">light</span><span class="tm-arrow"></span><span class="tm-dark">dark</span></button>
      </div>
    </header>

    <div class="tap" id="tap" tabindex="0" role="button" aria-label="Tap to set tempo">
      <div class="bpm idle" id="bpm">—</div>
      <div class="bpm-unit">BPM</div>
      <div class="tap-sub"><span class="tap-hint-key">Tap <kbd>T</kbd> or click here</span><span
          class="tap-hint-touch">Tap here</span></div>
    </div>

    <button class="reset" id="reset" disabled>Clear</button>

    <footer>
      <span>© Sync Beast LLC ·</span>
      <button class="info info-footer-word" type="button" id="privacyInfo" aria-label="Privacy"
        aria-expanded="false">privacy<span class="info-panel" role="tooltip">
          <div class="privacy-head">Nothing leaves your browser.</div>
          <p>TAPbaby runs entirely on your device. No servers, no analytics, no third parties. When you close the tab,
            everything is gone.</p>
        </span></button>
    </footer>
  </div>

  <script>
    // ============================================================
    // Theme toggle
    // ============================================================


    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('themeToggle');
      if (btn) {
        btn.addEventListener('click', () => {
          const cur = document.documentElement.getAttribute('data-theme') || 'light';
          const next = cur === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          try { localStorage.setItem('tap-theme', next); } catch (e) { }
        });
      }

      // Info tooltips: click-to-toggle, outside-click / Escape closes.
      const infos = document.querySelectorAll('.info');
      const closeAll = () => {
        infos.forEach(el => {
          el.classList.remove('open');
          el.setAttribute('aria-expanded', 'false');
        });
      };
      infos.forEach(info => {
        info.addEventListener('click', (e) => {
          e.stopPropagation();
          const wasOpen = info.classList.contains('open');
          closeAll();
          if (!wasOpen) {
            info.classList.add('open');
            info.setAttribute('aria-expanded', 'true');
          }
        });
        const panel = info.querySelector('.info-panel');
        if (panel) panel.addEventListener('click', (e) => e.stopPropagation());
      });
      document.addEventListener('click', closeAll);
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeAll(); });
    });

    // ============================================================
    // Tap tempo
    // ============================================================
    // Approach: collect tap timestamps, derive intervals, take the
    // median of the last 8 intervals. Median ignores stray slow first
    // taps and the occasional double-press without needing any
    // auto-reset window.
    //
    // Visual model: until the tool is confident, the BPM number is
    // "listening" — it flashes to full ink on each tap and fades toward
    // dim gray, so the user's taps ARE the pulse. Once the BPM has
    // stayed within ±1 for 4 taps in a row, the number locks solid green.
    // A subsequent unstable tap unlocks back to gray-fade mode.
    //
    // Outlier guard: an interval is only added if it's within 50–200%
    // of the running median, otherwise we treat it as a restart anchor
    // (re-seed the window from that tap forward) — this lets the user
    // silently re-calibrate without hitting Clear.
    //
    // Shared state (window.tapState) exposes the current detected BPM,
    // lock status, and the active multiplier so the metronome can sync.
    // ============================================================
    window.tapState = {
      bpm: null,          // raw detected BPM (not multiplied)
      locked: false,
      multiplier: 1,
      listeners: [],
    };
    window.tapState.notify = function () {
      this.listeners.forEach(fn => { try { fn(this); } catch (e) { } });
    };

    (function initTap() {
      const tapEl = document.getElementById('tap');
      const bpmEl = document.getElementById('bpm');
      const resetEl = document.getElementById('reset');
      const WINDOW = 8;            // intervals kept
      const LOCK_STREAK = 4;       // consecutive stable readings to lock
      const STABLE_TOL = 0.03;     // 3% deviation from median = stable
      const UNLOCK_TOL = 0.10;     // 10% from median breaks an existing lock
      const MIN_BPM = 30;
      const MAX_BPM = 300;
      const MIN_INTERVAL_MS = 60000 / MAX_BPM;  // 200ms
      const MAX_INTERVAL_MS = 60000 / MIN_BPM;  // 2000ms

      let timestamps = [];   // tap times (ms)
      let intervals = [];    // gaps between successive taps (ms)
      let stableCount = 0;   // how many consecutive stable readings
      let locked = false;
      let lastBpm = null;    // last computed raw BPM, for re-render on toggle
      let lastGap = null;    // last gap, for re-render
      let multiplier = 1;    // ½, 1, or 2 — display only, doesn't affect detection

      // Restore multiplier from previous session
      try {
        const saved = parseFloat(localStorage.getItem('tap-mult'));
        if (saved === 0.5 || saved === 1 || saved === 2) multiplier = saved;
      } catch (e) { }
      window.tapState.multiplier = multiplier;

      function median(arr) {
        if (!arr.length) return 0;
        const s = [...arr].sort((a, b) => a - b);
        const m = Math.floor(s.length / 2);
        return s.length % 2 ? s[m] : (s[m - 1] + s[m]) / 2;
      }

      function setIdle() {
        bpmEl.textContent = '—';
        bpmEl.classList.remove('locked');
        bpmEl.classList.add('idle');
        bpmEl.style.removeProperty('--fade');
        bpmEl.style.removeProperty('--fade-dur');
        resetEl.disabled = true;
        lastBpm = null;
        lastGap = null;
        window.tapState.bpm = null;
        window.tapState.locked = false;
        window.tapState.notify();
      }

      function showBpm(bpm, gapMs) {
        lastBpm = bpm;
        lastGap = gapMs;
        bpmEl.textContent = Math.round(bpm * multiplier);
        bpmEl.classList.remove('idle');

        if (locked) {
          // Solid green, no fade.
          bpmEl.classList.add('locked');
          bpmEl.style.setProperty('--fade', '1');
          bpmEl.style.setProperty('--fade-dur', '0.25s');
        } else {
          // Listening: full ink on tap, fade toward dim gray over the gap.
          // Brief transition reset so the flash-to-1 is instant, then fade.
          bpmEl.classList.remove('locked');
          bpmEl.style.setProperty('--fade-dur', '0s');
          bpmEl.style.setProperty('--fade', '1');
          // Force a reflow so the 0s transition applies before we change back.
          // eslint-disable-next-line no-unused-expressions
          bpmEl.offsetHeight;
          // Fade duration: roughly the gap, clamped so it doesn't feel broken.
          const fadeMs = gapMs ? Math.min(Math.max(gapMs * 0.9, 200), 1200) : 600;
          bpmEl.style.setProperty('--fade-dur', (fadeMs / 1000) + 's');
          bpmEl.style.setProperty('--fade', '0.25');  // fade target, not invisible
        }

        resetEl.disabled = false;

        // Publish to shared state.
        window.tapState.bpm = bpm;
        window.tapState.locked = locked;
        window.tapState.notify();
      }

      function flashTapZone() {
        tapEl.classList.add('flash');
        if (flashTapZone._t) clearTimeout(flashTapZone._t);
        flashTapZone._t = setTimeout(() => tapEl.classList.remove('flash'), 60);
      }

      function tap() {
        const now = performance.now();
        flashTapZone();

        // First tap of the session: just anchor, show nothing yet.
        if (timestamps.length === 0) {
          timestamps.push(now);
          return;
        }

        const last = timestamps[timestamps.length - 1];
        const gap = now - last;

        // Below MIN_INTERVAL_MS: probably an accidental double-press, ignore.
        if (gap < MIN_INTERVAL_MS) return;

        // Outlier guard. Needs at least 3 prior intervals to form a
        // meaningful median — otherwise we'd be comparing a tap against
        // a single sample and resetting on normal human variation.
        if (intervals.length >= 3) {
          const med = median(intervals);
          if (gap < med * 0.5 || gap > med * 2.0 || gap > MAX_INTERVAL_MS) {
            timestamps = [now];
            intervals = [];
            stableCount = 0;
            locked = false;
            setIdle();
            return;
          }
        } else if (gap > MAX_INTERVAL_MS) {
          timestamps = [now];
          intervals = [];
          stableCount = 0;
          locked = false;
          setIdle();
          return;
        }

        intervals.push(gap);
        timestamps.push(now);
        if (intervals.length > WINDOW) intervals.shift();
        if (timestamps.length > WINDOW + 1) timestamps.shift();

        const med = median(intervals);
        const bpm = Math.round(60000 / med);

        // Stability check: how far is this tap from the established median?
        // Comparing to the median (not the previous tap) is self-balancing —
        // two slightly-off-in-opposite-directions taps can both be in pocket.
        // Need at least 2 intervals before this comparison means anything.
        if (intervals.length >= 2) {
          const medDev = Math.abs(gap - med) / med;
          if (locked) {
            // Sticky lock: only break out if the user really wobbles.
            if (medDev > UNLOCK_TOL) {
              locked = false;
              stableCount = 1;
            }
            // else: stay locked, just update the displayed BPM.
          } else {
            if (medDev <= STABLE_TOL) {
              // Seed at 2 on first stable pair (this tap + previous = 2 stable),
              // then increment from there.
              stableCount = stableCount === 0 ? 2 : stableCount + 1;
            } else {
              stableCount = 1;
            }
            if (stableCount >= LOCK_STREAK) {
              locked = true;
            }
          }
        }

        showBpm(bpm, gap);
      }

      function clear() {
        timestamps = [];
        intervals = [];
        stableCount = 0;
        locked = false;
        setIdle();
      }

      // Click / touch on the tap zone
      tapEl.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        tap();
        tapEl.focus();
      });

      // Keyboard: T for tap, Esc to Clear, X to cycle multiplier.
      // Space/Enter also tap when the tap zone is focused.
      document.addEventListener('keydown', (e) => {
        const tag = (e.target.tagName || '').toLowerCase();
        if (tag === 'input' || tag === 'textarea') return;
        if (e.repeat) return;

        if (e.key === 't' || e.key === 'T') {
          e.preventDefault();
          tap();
        } else if (e.key === 'Escape') {
          // Only if there's something to clear.
          if (!resetEl.disabled) {
            e.preventDefault();
            clear();
          }
        } else if (e.key === 'x' || e.key === 'X') {
          e.preventDefault();
          cycleMultiplier();
        } else if ((e.key === ' ' || e.key === 'Enter') && document.activeElement === tapEl) {
          e.preventDefault();
          tap();
        }
      });

      // Multiplier toggle. Single button that cycles 1x → 2x → .5x → 1x.
      // Display-only — changes the shown number but never the detected
      // tempo. Updates live, so a user who locked at 70 BPM can hit "2x"
      // and instantly see 140.
      const multBtn = document.getElementById('multToggle');
      const MULT_CYCLE = [1, 2, 0.5];
      const MULT_LABEL = { 1: '1x', 2: '2x', 0.5: '.5x' };

      function paintMultiplier() {
        multBtn.textContent = MULT_LABEL[multiplier];
      }

      function cycleMultiplier() {
        const i = MULT_CYCLE.indexOf(multiplier);
        multiplier = MULT_CYCLE[(i + 1) % MULT_CYCLE.length];
        try { localStorage.setItem('tap-mult', String(multiplier)); } catch (e) { }
        paintMultiplier();
        window.tapState.multiplier = multiplier;
        window.tapState.notify();
        // Re-render with the new multiplier if we have a current reading.
        if (lastBpm !== null) showBpm(lastBpm, lastGap);
      }
      paintMultiplier();

      multBtn.addEventListener('click', cycleMultiplier);

      resetEl.addEventListener('click', clear);
    })();

    // ============================================================
    // Metronome
    // ============================================================
    // Synthesized click via Web Audio. Enabled only when the tap detector
    // is locked (green). Stops automatically if the user re-taps and
    // breaks the lock — the click should never be running against an
    // unstable reading.
    //
    // Scheduler uses the standard "look-ahead" pattern: a setInterval
    // at 25ms checks whether any clicks are due in the next ~100ms and
    // schedules them at exact AudioContext times. This avoids the drift
    // that plain setInterval(clickFn, intervalMs) accumulates.
    //
    // Click sound: a short blip — sine partials with a fast envelope,
    // ~30ms. Crisp enough to be clearly audible without being abrasive.
    // ============================================================
    (function initMetronome() {
      const metBtn = document.getElementById('metToggle');
      let audioCtx = null;
      let playing = false;
      let nextNoteTime = 0;     // AudioContext time of the next click
      let schedulerId = null;
      const LOOKAHEAD_MS = 25;
      const SCHEDULE_AHEAD_S = 0.1;

      function ensureCtx() {
        if (!audioCtx) {
          const AC = window.AudioContext || window.webkitAudioContext;
          audioCtx = new AC();
        }
        // Some browsers suspend the context until a user gesture.
        if (audioCtx.state === 'suspended') audioCtx.resume();
        return audioCtx;
      }

      function click(when) {
        const ctx = audioCtx;
        // Two sine partials: 1kHz fundamental + 2kHz overtone for "tick" body.
        // 30ms total with a fast attack, exponential decay.
        const osc1 = ctx.createOscillator();
        const osc2 = ctx.createOscillator();
        const gain = ctx.createGain();
        osc1.frequency.value = 1000;
        osc2.frequency.value = 2000;
        osc1.type = 'sine';
        osc2.type = 'sine';
        gain.gain.setValueAtTime(0.0001, when);
        gain.gain.exponentialRampToValueAtTime(0.5, when + 0.002);
        gain.gain.exponentialRampToValueAtTime(0.0001, when + 0.03);
        osc1.connect(gain);
        osc2.connect(gain);
        gain.connect(ctx.destination);
        osc1.start(when);
        osc2.start(when);
        osc1.stop(when + 0.04);
        osc2.stop(when + 0.04);
      }

      function currentIntervalSec() {
        // Use the displayed BPM (raw * multiplier) so the metronome matches
        // what the user sees, not the raw detection.
        const bpm = window.tapState.bpm * window.tapState.multiplier;
        return 60 / bpm;
      }

      function scheduler() {
        if (!playing || !window.tapState.locked || !window.tapState.bpm) {
          stop();
          return;
        }
        const interval = currentIntervalSec();
        while (nextNoteTime < audioCtx.currentTime + SCHEDULE_AHEAD_S) {
          click(nextNoteTime);
          nextNoteTime += interval;
        }
      }

      function start() {
        if (playing) return;
        if (!window.tapState.locked || !window.tapState.bpm) return;
        ensureCtx();
        playing = true;
        nextNoteTime = audioCtx.currentTime + 0.05;
        schedulerId = setInterval(scheduler, LOOKAHEAD_MS);
        metBtn.setAttribute('aria-pressed', 'true');
      }

      function stop() {
        if (schedulerId) {
          clearInterval(schedulerId);
          schedulerId = null;
        }
        playing = false;
        metBtn.setAttribute('aria-pressed', 'false');
      }

      function updateEnabled() {
        const canPlay = window.tapState.locked && window.tapState.bpm;
        metBtn.disabled = !canPlay;
        // If the lock was lost while playing, stop immediately.
        if (playing && !canPlay) stop();
      }

      metBtn.addEventListener('click', () => {
        if (playing) stop();
        else start();
      });

      // React to changes in lock state and multiplier.
      window.tapState.listeners.push((state) => {
        updateEnabled();
        // If playing and the multiplier changed, reset nextNoteTime so the
        // new tempo takes effect immediately rather than after the next
        // scheduled click at the old rate.
        if (playing && audioCtx) {
          nextNoteTime = Math.min(nextNoteTime, audioCtx.currentTime + currentIntervalSec());
        }
      });

      updateEnabled();
    })();
  </script>
</body>
